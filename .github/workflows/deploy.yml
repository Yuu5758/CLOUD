name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build Vue
        working-directory: ./frontend
        run: |
          pnpm install
          pnpm build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install Protobuf Compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build Rust Backend
        working-directory: ./backend
        run: |
          RUSTFLAGS="--cfg tokio_unstable" cargo build --release

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Install Sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Setup SSH Config
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<EOF
          Host ssh.u-u.my.id
            ProxyCommand cloudflared access ssh --hostname %h
            User bina
            StrictHostKeyChecking no
          EOF

      - name: Deploying Files
        run: |
          # Create target directory and grant permissions to bina
          sshpass -p "bina57" ssh bina@ssh.u-u.my.id "sudo mkdir -p /var/www/api-foryou && sudo chown -R bina:bina /var/www/api-foryou"

          # Sync Rust Binary
          sshpass -p "bina57" rsync -avz ./backend/target/release/rustfs bina@ssh.u-u.my.id:/var/www/api-foryou/
          
          # Sync Vue Build (Full .output for SSR)
          sshpass -p "bina57" rsync -avz ./frontend/.output/ bina@ssh.u-u.my.id:/var/www/api-foryou/vue-dist/

          # Sync Nginx Config (Upload to home folder first)
          sshpass -p "bina57" rsync -avz ./binalabs.conf bina@ssh.u-u.my.id:~/binalabs.conf
          
          # Move Nginx Config to correct directory and symlink using sudo
          sshpass -p "bina57" ssh bina@ssh.u-u.my.id "
            sudo mv ~/binalabs.conf /etc/nginx/sites-available/binalabs.conf
            sudo ln -sf /etc/nginx/sites-available/binalabs.conf /etc/nginx/sites-enabled/
          "
          
          # Restart Services
          # 1. Backend (Rust RustFS) - Port 1002
          sshpass -p "bina57" ssh bina@ssh.u-u.my.id "MINIO_PORT=1002 pm2 restart rustfs-api || MINIO_PORT=1002 pm2 start /var/www/api-foryou/rustfs --name rustfs-api"
          
          # 2. Frontend (Nuxt) - Port 1001
          sshpass -p "bina57" ssh bina@ssh.u-u.my.id "PORT=1001 pm2 restart api-web || PORT=1001 pm2 start /var/www/api-foryou/vue-dist/server/index.mjs --name api-web"
          
          # Reload Nginx
          sshpass -p "bina57" ssh bina@ssh.u-u.my.id "sudo nginx -t && sudo systemctl reload nginx"